name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип сборки (release или debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Git LFS and checkout binary assets
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs pull

      - name: Install required SDK & NDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;30.0.3" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platform-tools" \
            "extras;android;m2repository" \
            "ndk;21.4.7075529"

      - name: Copy dx from Build Tools 30 to 35
        run: |
          cp $ANDROID_HOME/build-tools/30.0.3/dx $ANDROID_HOME/build-tools/35.0.0/dx
          cp $ANDROID_HOME/build-tools/30.0.3/lib/dx.jar $ANDROID_HOME/build-tools/35.0.0/lib/dx.jar

      # Кеширование Gradle
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Включаем AndroidX и Jetifier (если ещё не включены)
      - name: Enable AndroidX and Jetifier
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      # Очистка перед сборкой (чтобы перегенерировать R-классы)
      - name: Clean project
        run: ./gradlew clean

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/21.4.7075529
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: -Xmx4096m -Dorg.gradle.jvmargs=-Xmx4096m
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew --stacktrace --info --warning-mode=all :TMessagesProj_App:assembleDebug
          else
            ./gradlew --stacktrace --info --warning-mode=all :TMessagesProj_App:assembleRelease
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type || 'release' }}
          path: TMessagesProj_App/build/outputs/apk/bundleAfat/${{ github.event.inputs.build_type || 'release' }}/app.apk
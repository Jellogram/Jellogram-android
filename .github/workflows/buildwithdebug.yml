name: Build Debug APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип сборки (release/debug/standalone)'
        required: true
        default: 'standalone'
        type: choice
        options:
          - release
          - debug
          - standalone

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK & NDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;30.0.3" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platform-tools" \
            "extras;android;m2repository" \
            "ndk;21.4.7075529"

      - name: Copy dx from Build Tools 30 to 35
        run: |
          cp $ANDROID_HOME/build-tools/30.0.3/dx $ANDROID_HOME/build-tools/35.0.0/dx
          cp $ANDROID_HOME/build-tools/30.0.3/lib/dx.jar $ANDROID_HOME/build-tools/35.0.0/lib/dx.jar

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 🔧 Создаём недостающие файлы-заглушки
      - name: Add missing JellogramSettings class
        run: |
          mkdir -p TMessagesProj/src/main/java/org/telegram/messenger
          cat > TMessagesProj/src/main/java/org/telegram/messenger/JellogramSettings.java << 'EOF'
          package org.telegram.messenger;

          public class JellogramSettings {
              private static JellogramSettings instance;
              public static JellogramSettings getInstance() {
                  if (instance == null) instance = new JellogramSettings();
                  return instance;
              }
              public boolean isShowUserId() { return false; }
          }
          EOF

      - name: Add BUILD_VERSION to BuildVars if missing
        run: |
          if ! grep -q "BUILD_VERSION" TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java; then
            sed -i '/public class BuildVars {/a \    public static int BUILD_VERSION = 7;' \
              TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
          fi

      - name: Add userIdRow field to ProfileActivity
        run: |
          if ! grep -q "private int userIdRow" TMessagesProj/src/main/java/org/telegram/ui/ProfileActivity.java; then
            sed -i '/public class ProfileActivity/a \    private int userIdRow = -1;' \
              TMessagesProj/src/main/java/org/telegram/ui/ProfileActivity.java
          fi

      - name: Enable buildConfig globally (if not already)
        run: |
          echo "android.defaults.buildfeatures.buildconfig=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/21.4.7075529
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_OPTS: -Xmx4096m -Dorg.gradle.jvmargs=-Xmx4096m
        run: |
          case "${{ github.event.inputs.build_type }}" in
            debug)
              ./gradlew --stacktrace :TMessagesProj_App:assembleDebug
              ;;
            standalone)
              ./gradlew --stacktrace :TMessagesProj_AppStandalone:assembleStandalone
              ;;
            *)
              ./gradlew --stacktrace :TMessagesProj_App:assembleRelease
              ;;
          esac

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type || 'standalone' }}
          path: |
            TMessagesProj_App/build/outputs/apk/bundleAfat/${{ github.event.inputs.build_type || 'standalone' }}/app.apk
            TMessagesProj_AppStandalone/build/outputs/apk/standalone/standalone/app.apk